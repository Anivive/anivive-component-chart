{{- if $.Values.ingress }}

{{- /* ------------------------------------------------------------------ */}}
{{- /* Shared variables                                                     */}}
{{- /* ------------------------------------------------------------------ */}}

{{- $baseName := $.Release.Name }}
{{- if $.Values.ingress.name }}
  {{- $baseName = $.Values.ingress.name }}
{{- else if $.Values.ingress.serviceName }}
  {{- $baseName = $.Values.ingress.serviceName }}
{{- else if $.Values.service.name }}
  {{- $baseName = $.Values.service.name }}
{{- end }}

{{- $apiVersion := "extensions/v1beta1" }}
{{- if $.Capabilities.APIVersions.Has "networking.k8s.io/v1/Ingress" }}
  {{- $apiVersion = "networking.k8s.io/v1" }}
{{- else if $.Capabilities.APIVersions.Has "networking.k8s.io/v1beta1/Ingress" }}
  {{- $apiVersion = "networking.k8s.io/v1beta1" }}
{{- end }}

{{- $tlsSecretName := "" }}
{{- if $.Values.ingress.tls }}
  {{- if not (eq (printf "%s" $.Values.ingress.tls) (printf "%s" false)) }}
    {{- if eq (printf "%s" $.Values.ingress.tls) (printf "%s" true) }}
      {{- $tlsSecretName = (printf "tls-%s" $baseName) }}
    {{- else }}
      {{- $tlsSecretName = $.Values.ingress.tls }}
    {{- end }}
  {{- end }}
{{- end }}

{{- if or (not (hasKey $.Values.ingress "grouped")) $.Values.ingress.grouped }}
{{- /* ------------------------------------------------------------------ */}}
{{- /* Grouped mode (default): single Ingress for all rules                */}}
{{- /* ------------------------------------------------------------------ */}}
apiVersion: {{ $apiVersion }}
kind: Ingress
metadata:
  name: {{ $baseName | quote }}
  {{- if $.Values.ingress.namespace }}
  namespace: {{ $.Values.ingress.namespace | quote }}
  {{- end }}
  labels:
    "app.kubernetes.io/component": {{ $.Release.Name | quote }}
    "app.kubernetes.io/name": {{ $.Release.Name | quote }}
    "app.kubernetes.io/managed-by": {{ $.Release.Service | quote }}
    {{- range $labelName, $labelValue := $.Values.ingress.labels }}
    {{ $labelName | quote }}: {{ $labelValue | quote }}
    {{- end }}
  annotations:
    "helm.sh/chart": "{{ $.Chart.Name }}-{{ $.Chart.Version }}"
    {{- $addClusterIssuer := true }}
    {{- $addIngressClass := true }}
    {{- range $annotationName, $annotationValue := $.Values.ingress.annotations }}
    {{- if or (eq $annotationName "cert-manager.io/cluster-issuer") (eq $annotationName "certmanager.k8s.io/cluster-issuer") (eq $annotationName "cert-manager.io/issuer") (eq $annotationName "certmanager.k8s.io/issuer") }}
      {{- $addClusterIssuer = false }}
    {{- end }}
    {{- if or (eq $annotationName "acme.cert-manager.io/http01-ingress-class") (eq $annotationName "certmanager.k8s.io/http01-ingress-class") }}
      {{- $addIngressClass = false }}
    {{- end }}
    {{ $annotationName | quote }}: {{ $annotationValue | quote }}
    {{- end }}
    {{- if ne (printf "%s" $tlsSecretName) "" }}
    {{- if $addClusterIssuer }}
    cert-manager.io/cluster-issuer: {{ $.Values.ingress.tlsClusterIssuer | default "lets-encrypt-http-issuer" | quote }}
    certmanager.k8s.io/cluster-issuer: {{ $.Values.ingress.tlsClusterIssuer | default "lets-encrypt-http-issuer" | quote }}
    {{- end }}
    {{- if $addIngressClass }}
    acme.cert-manager.io/http01-ingress-class: {{ $.Values.ingress.ingressClass | default "nginx" | quote }}
    certmanager.k8s.io/http01-ingress-class: {{ $.Values.ingress.ingressClass | default "nginx" | quote }}
    {{- end }}
    {{- end }}
spec:
  {{- if $.Values.ingress.defaultBackend }}
  defaultBackend:
{{ toYaml $.Values.ingress.defaultBackend | indent 4 }}
  {{- end }}
  {{- if $.Values.ingress.ingressClassName }}
  ingressClassName: {{ $.Values.ingress.ingressClassName }}
  {{- end }}
  rules:
  {{- range $ruleIndex, $rule := $.Values.ingress.rules }}
  {{- $svcPort := (index $.Values.service.ports 0).port }}
  {{- if $rule.servicePort }}
    {{- $svcPort = $rule.servicePort }}
  {{- end }}
  {{- $svcName := $.Values.service.name | default $.Release.Name }}
  {{- if $rule.serviceName }}
    {{- $svcName = $rule.serviceName }}
  {{- end }}
  - host: {{ $rule.host | quote }}
    http:
      paths:
      - backend:
        {{- if eq $apiVersion "networking.k8s.io/v1" }}
          service:
            name: {{ $svcName | quote }}
            port:
              number: {{ $svcPort }}
        {{- else }}
          serviceName: {{ $svcName }}
          servicePort: {{ $svcPort }}
        {{- end }}
        {{- if $rule.path }}
        path: {{ $rule.path | quote }}
        {{- else }}
        path: /
        {{- end }}
        {{- if semverCompare ">=1.18-0" $.Capabilities.KubeVersion.Version }}
        pathType: {{ $rule.pathType | default "ImplementationSpecific" | quote }}
        {{- end }}
  {{- end }}
  {{- if ne (printf "%s" $tlsSecretName) "" }}
  tls:
  - hosts:
    {{- if $.Values.ingress.tlsHost }}
    - {{ $.Values.ingress.tlsHost | quote }}
    {{- else if $.Values.ingress.tlsHosts }}
    {{- range $tlsHostIndex, $tlsHost := $.Values.ingress.tlsHosts }}
    - {{ $tlsHost | quote }}
    {{- end }}
    {{- else }}
    {{- range $ruleIndex, $rule := $.Values.ingress.rules }}
    - {{ $rule.host | quote }}
    {{- end }}
    {{- end }}
    {{- if $.Values.ingress.tlsSecretName }}
    secretName: {{ $.Values.ingress.tlsSecretName | quote }}
    {{- else }}
    secretName: {{ $tlsSecretName | quote }}
    {{- end }}
  {{- end }}

{{- else }}
{{- /* ------------------------------------------------------------------ */}}
{{- /* Per-rule mode: one Ingress per rule                                 */}}
{{- /* Set ingress.grouped: false to disable single shared Ingress.        */}}
{{- /* ------------------------------------------------------------------ */}}
{{- range $ruleIndex, $rule := $.Values.ingress.rules }}
---
apiVersion: {{ $apiVersion }}
kind: Ingress
metadata:
  {{- if $rule.name }}
  name: {{ $rule.name | quote }}
  {{- else }}
  name: {{ printf "%s-%d" $baseName $ruleIndex | quote }}
  {{- end }}
  {{- if $.Values.ingress.namespace }}
  namespace: {{ $.Values.ingress.namespace | quote }}
  {{- end }}
  labels:
    "app.kubernetes.io/component": {{ $.Release.Name | quote }}
    "app.kubernetes.io/name": {{ $.Release.Name | quote }}
    "app.kubernetes.io/managed-by": {{ $.Release.Service | quote }}
    {{- range $labelName, $labelValue := $.Values.ingress.labels }}
    {{ $labelName | quote }}: {{ $labelValue | quote }}
    {{- end }}
  annotations:
    "helm.sh/chart": "{{ $.Chart.Name }}-{{ $.Chart.Version }}"
    {{- $addClusterIssuer := true }}
    {{- $addIngressClass := true }}
    {{- range $annotationName, $annotationValue := $.Values.ingress.annotations }}
    {{- if or (eq $annotationName "cert-manager.io/cluster-issuer") (eq $annotationName "certmanager.k8s.io/cluster-issuer") (eq $annotationName "cert-manager.io/issuer") (eq $annotationName "certmanager.k8s.io/issuer") }}
      {{- $addClusterIssuer = false }}
    {{- end }}
    {{- if or (eq $annotationName "acme.cert-manager.io/http01-ingress-class") (eq $annotationName "certmanager.k8s.io/http01-ingress-class") }}
      {{- $addIngressClass = false }}
    {{- end }}
    {{ $annotationName | quote }}: {{ $annotationValue | quote }}
    {{- end }}
    {{- range $annotationName, $annotationValue := $rule.annotations }}
    {{- if or (eq $annotationName "cert-manager.io/cluster-issuer") (eq $annotationName "certmanager.k8s.io/cluster-issuer") (eq $annotationName "cert-manager.io/issuer") (eq $annotationName "certmanager.k8s.io/issuer") }}
      {{- $addClusterIssuer = false }}
    {{- end }}
    {{- if or (eq $annotationName "acme.cert-manager.io/http01-ingress-class") (eq $annotationName "certmanager.k8s.io/http01-ingress-class") }}
      {{- $addIngressClass = false }}
    {{- end }}
    {{ $annotationName | quote }}: {{ $annotationValue | quote }}
    {{- end }}
    {{- $ruleTlsSecretName := $tlsSecretName }}
    {{- if $.Values.ingress.tlsSecretName }}
      {{- $ruleTlsSecretName = $.Values.ingress.tlsSecretName }}
    {{- end }}
    {{- if $rule.tlsSecretName }}
      {{- $ruleTlsSecretName = $rule.tlsSecretName }}
    {{- end }}
    {{- if ne (printf "%s" $ruleTlsSecretName) "" }}
    {{- if $addClusterIssuer }}
    cert-manager.io/cluster-issuer: {{ $.Values.ingress.tlsClusterIssuer | default "lets-encrypt-http-issuer" | quote }}
    certmanager.k8s.io/cluster-issuer: {{ $.Values.ingress.tlsClusterIssuer | default "lets-encrypt-http-issuer" | quote }}
    {{- end }}
    {{- if $addIngressClass }}
    acme.cert-manager.io/http01-ingress-class: {{ $.Values.ingress.ingressClass | default "nginx" | quote }}
    certmanager.k8s.io/http01-ingress-class: {{ $.Values.ingress.ingressClass | default "nginx" | quote }}
    {{- end }}
    {{- end }}
spec:
  {{- if $.Values.ingress.ingressClassName }}
  ingressClassName: {{ $.Values.ingress.ingressClassName }}
  {{- end }}
  rules:
  {{- $svcPort := (index $.Values.service.ports 0).port }}
  {{- if $rule.servicePort }}
    {{- $svcPort = $rule.servicePort }}
  {{- end }}
  {{- $svcName := $.Values.service.name | default $.Release.Name }}
  {{- if $rule.serviceName }}
    {{- $svcName = $rule.serviceName }}
  {{- end }}
  - host: {{ $rule.host | quote }}
    http:
      paths:
      - backend:
        {{- if eq $apiVersion "networking.k8s.io/v1" }}
          service:
            name: {{ $svcName | quote }}
            port:
              number: {{ $svcPort }}
        {{- else }}
          serviceName: {{ $svcName }}
          servicePort: {{ $svcPort }}
        {{- end }}
        {{- if $rule.path }}
        path: {{ $rule.path | quote }}
        {{- else }}
        path: /
        {{- end }}
        {{- if semverCompare ">=1.18-0" $.Capabilities.KubeVersion.Version }}
        pathType: {{ $rule.pathType | default "ImplementationSpecific" | quote }}
        {{- end }}
  {{- $ruleTlsSecretName := $tlsSecretName }}
  {{- if $.Values.ingress.tlsSecretName }}
    {{- $ruleTlsSecretName = $.Values.ingress.tlsSecretName }}
  {{- end }}
  {{- if $rule.tlsSecretName }}
    {{- $ruleTlsSecretName = $rule.tlsSecretName }}
  {{- end }}
  {{- if ne (printf "%s" $ruleTlsSecretName) "" }}
  tls:
  - hosts:
    - {{ $rule.host | quote }}
    secretName: {{ $ruleTlsSecretName | quote }}
  {{- end }}
{{- end }}{{/* end range rules */}}
{{- end }}{{/* end if grouped */}}
{{- end }}{{/* end if $.Values.ingress */}}
